name: 🏗️ Quality Gate

on:
  workflow_call:
    secrets:
      DATABASE_URL:
        required: true
      BETTER_AUTH_SECRET:
        required: true
      BETTER_AUTH_URL:
        required: true
      BLOB_READ_WRITE_TOKEN:
        required: true
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:
        required: true
      STRIPE_SECRET_KEY:
        required: true
      STRIPE_WEBHOOK_SECRET:
        required: true
      NEXT_PUBLIC_SITE_URL:
        required: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm install

      # ─── Code quality ──────────────────────────────────────────────────

      - name: 🔍 Lint (0 errors, max 100 warnings)
        run: npm run lint -- --max-warnings 100

      - name: 🦀 Type check
        run: npx tsc --noEmit

      - name: 💀 Unused files & exports (knip)
        run: npm run check:unused -- --no-exit-code

      - name: 📋 Copy-paste detection (jscpd)
        run: npx jscpd --min-lines 8 --min-tokens 60 --format "ts,tsx" --threshold 4 app server lib components

      - name: 🔄 Circular dependency check
        run: node scripts/check-circular.mjs

      - name: 🏗️ Architecture Audit
        run: node scripts/check-architecture.mjs

      - name: ✨ Prettier formatting check
        run: npm run format:check || echo "⚠️  Formatting issues found — run 'npm run format' to fix"

      # ─── Build ─────────────────────────────────────────────────────────

      - name: 🔨 Build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || "https://www.splashdeals.rs" }}
        run: npm run build

      - name: 💾 Cache .next build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}
