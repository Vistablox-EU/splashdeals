name: CI — Quality + Validation (PR → master)

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/reusable-quality.yml
    secrets: inherit

  test:
    needs: [quality]
    uses: ./.github/workflows/reusable-test.yml
    secrets: inherit
