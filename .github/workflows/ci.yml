name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm install
        env:
          DATABASE_URL: postgresql://dummy:***@localhost:5432/dummy
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run format:check
      - run: node scripts/check-architecture.mjs
      - run: node scripts/check-circular.mjs
      - run: npm run check:unused -- --no-exit-code 2>&1
      - run: npx jscpd --min-lines 8 --min-tokens 60 --format "ts,tsx" --threshold 5 app server lib components

  deploy:
    if: github.event_name == 'push'
    needs: quality
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Deploy to Vercel
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
