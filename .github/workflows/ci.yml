name: CI — Lint, Typecheck, Dead/Duplicate Code, Tests, Build, SEO, Lighthouse & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm install

      # ─── Code quality ──────────────────────────────────────────────────

      - name: 🔍 Lint (0 errors, max 100 warnings)
        run: npm run lint -- --max-warnings 100

      - name: 🦀 Type check
        run: npx tsc --noEmit

      - name: 💀 Unused files & exports (knip)
        run: npm run check:unused -- --no-exit-code

      - name: 📋 Copy-paste detection (jscpd)
        run: npx jscpd --min-lines 8 --min-tokens 60 --format 'ts,tsx' --threshold 4 app server lib components

      - name: 🔄 Circular dependency check
        run: node scripts/check-circular.mjs

      - name: 🏗️ Architecture Audit
        run: node scripts/check-architecture.mjs

      - name: ✨ Prettier formatting check
        run: npm run format:check || echo "⚠️  Formatting issues found — run 'npm run format' to fix"

      # ─── Tests ─────────────────────────────────────────────────────────

      - name: ⚡ Unit tests
        run: npm run test:unit

      # ─── Build + SEO (YAML anchor deduplicates env vars) ───────────────

      - name: 🔨 Build
        env: &build_env
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://www.splashdeals.rs' }}
        run: npm run build

      - name: 💾 Cache .next build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}

      - name: 🔍 SEO Crawlability & Indexability Check
        env: *build_env
        run: node scripts/check-seo.mjs

      - name: 🔎 Structured Data / Rich Results Validation
        env: *build_env
        run: node scripts/check-structured-data.mjs

      # ─── Deploy ────────────────────────────────────────────────────────

      - name: 🚀 Deploy to Production (Vercel)
        if: github.event_name == 'push' && success()
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
