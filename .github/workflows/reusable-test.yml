name: 🧪 Validation Gate

on:
  workflow_call:
    secrets:
      DATABASE_URL:
        required: true
      BETTER_AUTH_SECRET:
        required: true
      BETTER_AUTH_URL:
        required: true
      BLOB_READ_WRITE_TOKEN:
        required: true
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:
        required: true
      STRIPE_SECRET_KEY:
        required: true
      STRIPE_WEBHOOK_SECRET:
        required: true
      NEXT_PUBLIC_SITE_URL:
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm install

      # ─── Unit tests ────────────────────────────────────────────────────

      - name: ⚡ Unit tests
        run: npm run test:unit

      # ─── SEO + validation (shared env vars) ────────────────────────────

      - name: 🔍 SEO Crawlability & Indexability Check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || "https://www.splashdeals.rs" }}
        run: node scripts/check-seo.mjs

      - name: 🔎 Structured Data / Rich Results Validation
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || "https://www.splashdeals.rs" }}
        run: node scripts/check-structured-data.mjs
